<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

  <div class="album-art">🎵</div>

  <div class="info">
    <div class="song-title" id="songTitle">Song Title</div>
    <div class="song-artist" id="songArtist">Artist Name</div>
  </div>

  <div class="progress-section">
    <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn" title="Previous">⏮</button>
    <button id="playBtn" class="play-btn" title="Play/Pause">▶</button>
    <button id="nextBtn" title="Next">⏭</button>
  </div>

  <div class="volume-section">
    <span>🔉</span>
    <input type="range" class="volume-bar" id="volumeBar" min="0" max="1" step="0.01" value="1">
  </div>

  <div class="bottom-row">
    <label class="autoplay-toggle">
      <input type="checkbox" id="autoplayToggle" checked>
      Autoplay next song
    </label>
  </div>

  <ul class="playlist" id="playlist"></ul>

  <audio id="audio"></audio>

</div>

<script src="script.js"></script>
</body>
</html>
